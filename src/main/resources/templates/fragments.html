<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<body>

<div th:fragment="sidebar(currentUser)" th:if="${currentUser != null}">
    <div class="d-flex flex-column p-3 bg-light border-end" style="width: 260px; min-height: 100vh;">


        <h5 class="mb-1" th:text="${currentUser.email}">admin@mail.ru</h5>
        <p class="text-muted mb-2">with roles:</p>


        <div class="mb-4">

            <div th:each="role : ${currentUser.roles}" class="mb-1">

                <span th:if="${role.name == 'ROLE_ADMIN'}" class="badge bg-primary" th:text="${role.name}">ADMIN</span>

                <span th:unless="${role.name == 'ROLE_ADMIN'}" th:text="${role.name}">USER</span>
            </div>
        </div>


        <div class="flex-grow-1"></div>


        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-danger btn-sm w-100">Logout</button>
        </form>

    </div>
</div>

</body>
</html>
