<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Please sign in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">Please sign in</h3>
                    <div th:if="${param.error}" class="alert alert-danger">Invalid email or password.</div>
                    <div th:if="${param.logout}" class="alert alert-info">You have been logged out.</div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <input type="text" name="username" class="form-control"
                                   placeholder="Email address" required autofocus>
                        </div>
                        <div class="mb-3">
                            <input type="password" name="password" class="form-control"
                                   placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Sign in</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
