<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white"
              th:utext="${currentUser.email} + ' with roles: ' + ${#strings.listJoin(currentUser.roles.![#this.name.replace('ROLE_','')], ' ')}">
            admin@mail.ru with roles: ADMIN USER
        </span>
        <form th:action="@{/logout}" method="post" class="d-flex">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-auto p-0">
            <div th:replace="fragments :: sidebarAdmin(currentUser=${currentUser})"></div>
        </div>

        <div class="col p-4 tab-content" id="mainContent">
            <div class="tab-pane fade show active" id="adminContent" role="tabpanel" aria-labelledby="admin-tab">
                <h2>Admin panel</h2>

                <ul class="nav nav-tabs mb-3" id="adminSubTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#tableView" type="button" role="tab" aria-controls="tableView" aria-selected="true">Users table</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="newuser-tab" data-bs-toggle="tab" data-bs-target="#newUserForm" type="button" role="tab" aria-controls="newUserForm" aria-selected="false">New User</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="tableView" role="tabpanel" aria-labelledby="users-tab">
                        <table class="table table-bordered table-striped">
                            <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            </thead>
                            <tbody id="userTableBody">
                            </tbody>
                        </table>
                    </div>

                    <div class="tab-pane fade" id="newUserForm" role="tabpanel" aria-labelledby="newuser-tab">
                        <h5>Add new user</h5>
                        <form id="addUserForm">
                            <div class="mb-3">
                                <label class="form-label">First name</label>
                                <input type="text" class="form-control" id="newFirstName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Last name</label>
                                <input type="text" class="form-control" id="newLastName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-control" id="newAge">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="newEmail" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="newPassword" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Role</label>
                                <div id="newRolesCheckboxes"></div>
                            </div>
                            <button type="button" id="saveNewUserBtn" class="btn btn-primary">Add new user</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="userContent" role="tabpanel" aria-labelledby="user-tab">
                <h2>User information</h2>
                <hr>
                <table class="table table-bordered table-striped">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td th:text="${currentUser.id}">1</td>
                        <td th:text="${currentUser.firstName}">Admin</td>
                        <td th:text="${currentUser.lastName}">Adminov</td>
                        <td th:text="${currentUser.age}">35</td>
                        <td th:text="${currentUser.email}">admin@mail.ru</td>
                        <td>
                            <span th:each="role, iter : ${currentUser.roles}"
                                  th:text="${role.name.replace('ROLE_','')} + (${iter.last}? '' : ', ')">ADMIN, USER</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editUserForm">
                    <input type="hidden" id="editUserId">
                    <div class="mb-3">
                        <label class="form-label">First name</label>
                        <input type="text" class="form-control" id="editFirstName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last name</label>
                        <input type="text" class="form-control" id="editLastName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" id="editAge">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="editEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password (leave blank to keep unchanged)</label>
                        <input type="password" class="form-control" id="editPassword">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <div id="editRolesCheckboxes"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-success" id="saveEditBtn">Edit</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete user <strong id="deleteUserName"></strong>?</p>
                <table class="table table-sm" id="deleteUserInfo"></table>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    let users = [];
    let allRoles = [];
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));
    const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));

    async function loadUsers() {
        const response = await fetch('/api/users');
        if (response.ok) {
            users = await response.json();
            renderUserTable();
        }
    }
    async function loadRoles() {
        const response = await fetch('/api/roles');
        if (response.ok) {
            allRoles = await response.json();
            renderRolesCheckboxes('newRolesCheckboxes', null);
            renderRolesCheckboxes('editRolesCheckboxes', null);
        }
    }

    function renderRolesCheckboxes(containerId, selectedRoles) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        allRoles.forEach(role => {
            const div = document.createElement('div');
            div.className = 'form-check';
            const checked = selectedRoles && selectedRoles.includes(role.name) ? 'checked' : '';
            div.innerHTML = `
                <input class="form-check-input" type="checkbox" value="${role.name}" id="${containerId}_${role.id}" ${checked}>
                <label class="form-check-label" for="${containerId}_${role.id}">${role.name.replace('ROLE_', '')}</label>
            `;
            container.appendChild(div);
        });
    }

    function getSelectedRoles(containerId) {
        const checkboxes = document.querySelectorAll(`#${containerId} input:checked`);
        return Array.from(checkboxes).map(cb => cb.value);
    }

    function setSelectedRoles(containerId, roleNames) {
        const checkboxes = document.querySelectorAll(`#${containerId} input`);
        checkboxes.forEach(cb => {
            cb.checked = roleNames.includes(cb.value);
        });
    }

    function renderUserTable() {
        const tbody = document.getElementById('userTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        users.forEach(user => {
            const row = document.createElement('tr');
            row.innerHTML =
                `<td>${user.id}</td>
                <td>${user.firstName || ''}</td>
                <td>${user.lastName || ''}</td>
                <td>${user.age || ''}</td>
                <td>${user.email}</td>
                <td>${user.roles ? user.roles.map(r => r.replace('ROLE_', '')).join(', ') : ''}</td>
                <td><button class="btn btn-sm btn-warning" data-user-id="${user.id}">Edit</button></td>
                <td><button class="btn btn-sm btn-danger" data-user-id="${user.id}">Delete</button></td>`;
            row.querySelector('.btn-warning').addEventListener('click', () => editUser(user.id));
            row.querySelector('.btn-danger').addEventListener('click', () => showDeleteConfirmation(user.id));
            tbody.appendChild(row);
        });
    }

    document.getElementById('newuser-tab').addEventListener('shown.bs.tab', function () {
        document.getElementById('addUserForm').reset();
        setSelectedRoles('newRolesCheckboxes', []);
    });

    document.getElementById('saveNewUserBtn').addEventListener('click', async () => {
        const userData = {
            firstName: document.getElementById('newFirstName').value,
            lastName: document.getElementById('newLastName').value,
            age: document.getElementById('newAge').value || null,
            email: document.getElementById('newEmail').value,
            password: document.getElementById('newPassword').value,
            roles: getSelectedRoles('newRolesCheckboxes'),
            username: document.getElementById('newEmail').value
        };
        const response = await fetch('/api/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        });
        if (response.ok) {
            // Вернуться на вкладку таблицы
            const tab = document.getElementById('users-tab');
            const bsTab = new bootstrap.Tab(tab);
            bsTab.show();
            await loadUsers();
        } else {
            alert('Error creating user');
        }
    });

    function editUser(id) {
        const user = users.find(u => u.id === id);
        if (!user) return;
        document.getElementById('editUserId').value = user.id;
        document.getElementById('editFirstName').value = user.firstName || '';
        document.getElementById('editLastName').value = user.lastName || '';
        document.getElementById('editAge').value = user.age || '';
        document.getElementById('editEmail').value = user.email || '';
        document.getElementById('editPassword').value = '';
        setSelectedRoles('editRolesCheckboxes', user.roles || []);
        editModal.show();
    }
    document.getElementById('saveEditBtn').addEventListener('click', async () => {
        const id = document.getElementById('editUserId').value;
        const userData = {
            id: id,
            firstName: document.getElementById('editFirstName').value,
            lastName: document.getElementById('editLastName').value,
            age: document.getElementById('editAge').value || null,
            email: document.getElementById('editEmail').value,
            password: document.getElementById('editPassword').value,
            roles: getSelectedRoles('editRolesCheckboxes'),
            username: document.getElementById('editEmail').value
        };
        const response = await fetch('/api/users/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        });
        if (response.ok) {
            editModal.hide();
            await loadUsers();
        } else {
            alert('Error updating user');
        }
    });

    let deleteTargetId = null;
    function showDeleteConfirmation(id) {
        const user = users.find(u => u.id === id);
        if (!user) return;
        deleteTargetId = id;
        document.getElementById('deleteUserName').textContent = user.email;
        const info = document.getElementById('deleteUserInfo');
        info.innerHTML = `
            <tr><th>ID</th><td>${user.id}</td></tr>
            <tr><th>First Name</th><td>${user.firstName || ''}</td></tr>
            <tr><th>Last Name</th><td>${user.lastName || ''}</td></tr>
            <tr><th>Age</th><td>${user.age || ''}</td></tr>
            <tr><th>Email</th><td>${user.email}</td></tr>
            <tr><th>Role</th><td>${user.roles ? user.roles.map(r => r.replace('ROLE_', '')).join(', ') : ''}</td></tr>
        `;
        deleteModal.show();
    }
    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
        if (!deleteTargetId) return;
        const response = await fetch('/api/users/' + deleteTargetId, { method: 'DELETE' });
        if (response.ok) {
            deleteModal.hide();
            await loadUsers();
        } else {
            alert('Error deleting user');
        }
    });

    window.addEventListener('DOMContentLoaded', async () => {
        await Promise.all([loadUsers(), loadRoles()]);
    });
</script>
</body>
</html>
