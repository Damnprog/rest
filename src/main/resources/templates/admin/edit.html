<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование пользователя</title>
</head>
<body>
<h1>Редактирование</h1>
<form th:action="@{/admin/{id}(id=${user.id})}" method="post" th:object="${user}">
    <input type="hidden" name="_method" value="put"/>
    <div><label>Логин: <input type="text" th:field="*{username}" required/></label></div>
    <div><label>Новый пароль (оставьте пустым, чтобы не менять): <input type="password" name="password"/></label></div>
    <div><label>Имя: <input type="text" th:field="*{firstName}"/></label></div>
    <div><label>Фамилия: <input type="text" th:field="*{lastName}"/></label></div>
    <div><label>Email: <input type="email" th:field="*{email}"/></label></div>
    <div>
        <label>Роли:</label><br/>
        <div th:each="role : ${allRoles}">
            <!-- отмечаем уже выбранные роли -->
            <input type="checkbox" name="roleIds" th:value="${role.id}"
                   th:checked="${user.roles.contains(role)}"/>
            <label th:text="${role.name}">ROLE</label>
        </div>
    </div>
    <br/>
    <button type="submit">Обновить</button>
    <a th:href="@{/admin}">Отмена</a>
</form>
</body>
</html>
