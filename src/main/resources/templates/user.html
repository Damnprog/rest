<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User information</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white"
              th:utext="${currentUser.email} + ' with roles: ' + ${#strings.listJoin(currentUser.roles.![#this.name.replace('ROLE_','')], ' ')}">
            user@mail.ru with roles: USER
        </span>
        <form th:action="@{/logout}" method="post" class="d-flex">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Левая боковая панель -->
        <div class="col-auto p-0">
            <div th:replace="fragments :: sidebar(currentUser=${currentUser})"></div>
        </div>

        <!-- Правый контент -->
        <div class="col p-4">
            <h2>User information</h2>
            <hr>
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Age</th>
                    <th>Email</th>
                    <th>Role</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td th:text="${currentUser.id}">1</td>
                    <td th:text="${currentUser.firstName}">John</td>
                    <td th:text="${currentUser.lastName}">Doe</td>
                    <td th:text="${currentUser.age}">30</td>
                    <td th:text="${currentUser.email}">user@mail.ru</td>
                    <td>
                        <span th:each="role, iter : ${currentUser.roles}"
                              th:text="${role.name.replace('ROLE_','')} + (${iter.last}? '' : ', ')">USER</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
